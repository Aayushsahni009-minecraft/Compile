name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4 # Use @v4 but force Node 24 via env if v5/v6 isn't fully published

    - name: Set up JDK 17
      uses: actions/setup-java@v4 
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4 
      with:
        node-version: '18'

    - name: Cache Node Modules and Cordova
      uses: actions/cache@v4 
      with:
        path: |
          node_modules
          ~/.npm
          platforms
          plugins
        key: ${{ runner.os }}-cordova-${{ hashFiles('package-lock.json', 'config.xml') }}
        restore-keys: |
          ${{ runner.os }}-cordova-

    - name: Install Cordova CLI
      run: npm install -g cordova

    - name: Install Project Dependencies
      run: npm install

    - name: Add and Prepare Android Platform
      run: |
        cordova platform add android --nosave --no-telemetry || true
        cordova prepare android

    - name: Build Android APK (Debug)
      run: cordova build android --debug --device

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 
      with:
        name: Command-God-Debug-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
